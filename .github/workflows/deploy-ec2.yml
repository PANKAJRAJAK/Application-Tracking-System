name: Deploy Streamlit App to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY secret is not set." >&2
            exit 1
          fi

          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is not set." >&2
            exit 1
          fi

          python - <<'PY'
          import os
          from pathlib import Path

          ssh_dir = Path.home() / ".ssh"
          ssh_dir.mkdir(parents=True, exist_ok=True)
          ssh_dir.chmod(0o700)

          key_path = ssh_dir / "id_ed25519"
          key_path.write_text(os.environ["EC2_SSH_KEY"].rstrip("\n") + "\n", encoding="utf-8")
          key_path.chmod(0o600)

          config_path = ssh_dir / "config"
          config_path.write_text("Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  LogLevel ERROR\n", encoding="utf-8")
          config_path.chmod(0o600)
          PY

      - name: Deploy to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail

          if [ -z "$EC2_USER" ]; then
            echo "EC2_USER secret is not set." >&2
            exit 1
          fi

          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is not set." >&2
            exit 1
          fi

          ssh -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" << 'EOF'
            set -e
            cd ~/Application-Tracking-System

            # Hard sync with GitHub (clean deploy)
            git fetch origin
            git reset --hard origin/main

            # Activate env
            if [ -d "$HOME/venv" ]; then
              source $HOME/venv/bin/activate
            fi

            pip install -r requirements.txt

            # Kill old app safely
            pkill -f streamlit || true

            # Start app detached from SSH
            nohup streamlit run app.py --server.port 3000 --server.address 0.0.0.0 > streamlit.log 2>&1 & disown

          EOF