name: Deploy Streamlit App to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS credentials
        run: |
          set -euo pipefail
          aws sts get-caller-identity --output json

      - name: Deploy to EC2 via SSM
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          EC2_INSTANCE_NAME: ${{ secrets.EC2_INSTANCE_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "AWS_ACCESS_KEY_ID secret is not set." >&2
            exit 1
          fi

          if [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "AWS_SECRET_ACCESS_KEY secret is not set." >&2
            exit 1
          fi

          if [ -z "${AWS_DEFAULT_REGION:-}" ]; then
            echo "AWS_REGION secret is not set." >&2
            exit 1
          fi

          INSTANCE_NAME="${EC2_INSTANCE_NAME:-ATSAIServer}"
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Could not find a running EC2 instance named ${INSTANCE_NAME}." >&2
            exit 1
          fi

          cat > /tmp/ssm-commands.json <<'JSON'
          {
            "commands": [
              "set -e",
              "REPO_DIR=\"$HOME/Application-Tracking-System\"",
              "if [ -d /home/ubuntu/Application-Tracking-System ]; then REPO_DIR=/home/ubuntu/Application-Tracking-System; elif [ -d /home/ec2-user/Application-Tracking-System ]; then REPO_DIR=/home/ec2-user/Application-Tracking-System; fi",
              "mkdir -p \"$REPO_DIR\"",
              "cd \"$REPO_DIR\"",
              "git fetch origin",
              "git reset --hard origin/main",
              "if [ -f \"$REPO_DIR/venv/bin/activate\" ]; then",
              "  source \"$REPO_DIR/venv/bin/activate\"",
              "fi",
              "pip install -r requirements.txt",
              "pkill -f streamlit || true",
              "nohup streamlit run app.py --server.port 8501 --server.address 0.0.0.0 > streamlit.log 2>&1 & disown"
            ]
          }
          JSON

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-commands.json \
            --output text \
            --query 'Command.CommandId')"

          if [ -z "$COMMAND_ID" ]; then
            echo "Failed to create an SSM command on instance ${INSTANCE_ID}." >&2
            exit 1
          fi

          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output text \
            --query 'StandardOutputContent'

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output text \
            --query 'StandardErrorContent'